name: CI

on:
  # 分支 push 不触发；仅推送 v* 标签时跑测试与 release构建
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  # 全部测试通过后：编译 release 三平台制品并上传为 Workflow Artifact
  build-release:
    name: build release (${{ matrix.asset_name }})
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: img-kit-aarch64-apple-darwin
            artifact_file: img-kit-aarch64-apple-darwin.tar.gz
            pack: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: img-kit-x86_64-apple-darwin
            artifact_file: img-kit-x86_64-apple-darwin.tar.gz
            pack: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: img-kit-x86_64-pc-windows-msvc
            artifact_file: img-kit-x86_64-pc-windows-msvc.zip
            pack: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (.tar.gz)
        if: matrix.pack == 'tar.gz'
        run: |
          mkdir -p pack
          cp "target/${{ matrix.target }}/release/img-kit" "pack/${{ matrix.asset_name }}"
          chmod +x "pack/${{ matrix.asset_name }}"
          tar -czvf "${{ matrix.artifact_file }}" -C pack "${{ matrix.asset_name }}"

      - name: Package (.zip)
        if: matrix.pack == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pack | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/img-kit.exe" "pack/${{ matrix.asset_name }}.exe"
          Compress-Archive -Path "pack/${{ matrix.asset_name }}.exe" -DestinationPath "${{ matrix.artifact_file }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_file }}

  # 推送 v* 标签时：将上述制品发布为 GitHub Release（需先通过测试与构建）
  publish-release:
    name: publish GitHub Release
    needs: build-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
