name: CI

on:
  # 分支 push 不触发；仅推送 v* 标签时跑测试与 release构建
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  # 全部测试通过后：编译 release 三平台制品并上传为 Workflow Artifact
  build-release:
    name: build release (${{ matrix.asset_name }})
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: img-kit-darwin-arm64
            artifact_file: img-kit-darwin-arm64.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: img-kit-darwin-x64
            artifact_file: img-kit-darwin-x64.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: img-kit-win32-x64
            artifact_file: img-kit-win32-x64.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (.gz) on macOS
        if: runner.os != 'Windows'
        run: |
          mkdir -p pack
          cp "target/${{ matrix.target }}/release/img-kit" "pack/${{ matrix.asset_name }}"
          chmod +x "pack/${{ matrix.asset_name }}"
          gzip -c "pack/${{ matrix.asset_name }}" > "${{ matrix.artifact_file }}"

      - name: Package (.gz) on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pack | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/img-kit.exe" "pack/${{ matrix.asset_name }}.exe"
          $bytes = [System.IO.File]::ReadAllBytes("pack/${{ matrix.asset_name }}.exe")
          $fs = [System.IO.File]::Create("${{ matrix.artifact_file }}")
          try {
            $gzip = New-Object System.IO.Compression.GzipStream($fs, [System.IO.Compression.CompressionLevel]::Optimal)
            try {
              $gzip.Write($bytes, 0, $bytes.Length)
            } finally {
              $gzip.Dispose()
            }
          } finally {
            $fs.Dispose()
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_file }}

  # 推送 v* 标签时：将上述制品发布为 GitHub Release（需先通过测试与构建）
  publish-release:
    name: publish GitHub Release
    needs: build-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
